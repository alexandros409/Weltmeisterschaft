<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="worldCupBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060B1E" />
      <stop offset="50%" stop-color="#0F1C3F" />
      <stop offset="100%" stop-color="#030611" />
    </linearGradient>

    <linearGradient id="glassLayer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03" />
    </linearGradient>

    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.4" />
    </linearGradient>

    <linearGradient id="predictionArc" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0072ff" />
      <stop offset="60%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#ffd700" />
    </linearGradient>

    <filter id="heavyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.65" />
    </filter>
    
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#worldCupBg)" />

  <circle cx="380" cy="140" r="80" fill="#ffd700" opacity="0.15" filter="url(#neonGlow)" />
  <circle cx="130" cy="380" r="70" fill="#00f2fe" opacity="0.2" filter="url(#neonGlow)" />

  <rect x="86" y="86" width="340" height="340" rx="55" fill="url(#glassLayer)" stroke="url(#glassBorder)" stroke-width="2.5" filter="url(#heavyShadow)" />

  <g filter="url(#heavyShadow)">
    <path d="M 120 380 C 120 220, 260 120, 380 140" fill="none" stroke="url(#predictionArc)" stroke-width="10" stroke-linecap="round" filter="url(#neonGlow)" />
    
    <g transform="translate(256, 230)">
      <circle cx="0" cy="0" r="65" fill="#101F42" stroke="#00f2fe" stroke-width="5" filter="url(#neonGlow)" />
      <polygon points="0,-22 21,-6 13,19 -13,19 -21,-6" fill="none" stroke="#00f2fe" stroke-width="3" opacity="0.9" />
      <line x1="0" y1="-22" x2="0" y2="-65" stroke="#00f2fe" stroke-width="3" opacity="0.8" />
      <line x1="21" y1="-6" x2="58" y2="-29" stroke="#00f2fe" stroke-width="3" opacity="0.8" />
      <line x1="13" y1="19" x2="38" y2="53" stroke="#00f2fe" stroke-width="3" opacity="0.8" />
      <line x1="-13" y1="19" x2="-38" y2="53" stroke="#00f2fe" stroke-width="3" opacity="0.8" />
      <line x1="-21" y1="-6" x2="-58" y2="-29" stroke="#00f2fe" stroke-width="3" opacity="0.8" />
    </g>

    <path d="M 380 140 L 383 130 L 393 127 L 383 124 L 380 114 L 377 124 L 367 127 L 377 130 Z" fill="#ffd700" filter="url(#neonGlow)" />
  </g>

  <rect x="120" y="120" width="40" height="6" rx="3" fill="#ffffff" opacity="0.3" />
  <rect x="120" y="132" width="25" height="6" rx="3" fill="#ffffff" opacity="0.15" />
</svg>

